<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      font-size: 12px;
      color: #333;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100vh;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
    }

    label {
      font-size: 11px;
      font-weight: 500;
      color: #666;
    }

    textarea {
      width: 100%;
      height: 160px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: 'SF Mono', ui-monospace, monospace;
      font-size: 11px;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: #18a0fb;
      box-shadow: 0 0 0 2px rgba(24, 160, 251, 0.15);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-row input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    button {
      padding: 8px 20px;
      background: #18a0fb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #0d8de5;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .results {
      padding: 12px;
      background: #f5f5f5;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.6;
      white-space: pre-wrap;
      display: none;
    }

    .results.visible {
      display: block;
    }

    .results.error {
      background: #fff0f0;
      color: #c00;
    }

    .results.success {
      background: #f0fff4;
      color: #060;
    }
  </style>
</head>
<body>
  <h2>DS Token Sync</h2>

  <div>
    <label for="json-input">Paste resolved theme JSON:</label>
    <textarea
      id="json-input"
      placeholder='{ "theme": "light", "tokens": [ ... ] }'
      spellcheck="false"
    ></textarea>
  </div>

  <div class="controls">
    <label class="checkbox-row">
      <input type="checkbox" id="dry-run" />
      Dry Run
    </label>
    <button id="sync-btn">Sync</button>
  </div>

  <div id="results" class="results"></div>

  <script>
    const textarea = document.getElementById("json-input");
    const dryRunCheckbox = document.getElementById("dry-run");
    const syncBtn = document.getElementById("sync-btn");
    const resultsDiv = document.getElementById("results");

    syncBtn.addEventListener("click", () => {
      const raw = textarea.value.trim();
      if (!raw) {
        showResult("Please paste resolved theme JSON.", "error");
        return;
      }

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch (e) {
        showResult("Invalid JSON: " + e.message, "error");
        return;
      }

      if (!parsed.theme || !parsed.tokens) {
        showResult('JSON must have "theme" and "tokens" fields.', "error");
        return;
      }

      syncBtn.disabled = true;
      syncBtn.textContent = "Syncing...";

      parent.postMessage({
        pluginMessage: {
          type: "sync",
          theme: parsed.theme,
          tokens: Array.isArray(parsed.tokens)
            ? parsed.tokens
            : Object.values(parsed.tokens),
          dryRun: dryRunCheckbox.checked,
        },
      }, "*");
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      syncBtn.disabled = false;
      syncBtn.textContent = "Sync";

      if (msg.type === "result") {
        const lines = [];
        if (msg.dryRun) lines.push("[DRY RUN] No changes written.\n");
        lines.push(`Theme:     ${msg.theme}`);
        lines.push(`Created:   ${msg.created}`);
        lines.push(`Updated:   ${msg.updated}`);
        lines.push(`Unchanged: ${msg.unchanged}`);

        let resultHtml = lines.join("\n");
        if (msg.orphanedNames && msg.orphanedNames.length > 0) {
          const orphanedCount = msg.orphanedNames.length;
          let orphanedSection = `\nOrphaned (not deleted): ${orphanedCount}\n`;
          for (const name of msg.orphanedNames) {
            orphanedSection += `  - ${name}\n`;
          }
          resultHtml += orphanedSection;
        }

        showResult(resultHtml, "success");
      } else if (msg.type === "error") {
        showResult("Error: " + msg.message, "error");
      }
    };

    function showResult(text, type) {
      resultsDiv.textContent = text;
      resultsDiv.className = "results visible " + type;
    }
  </script>
</body>
</html>
